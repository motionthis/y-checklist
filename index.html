<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Daily Checklist</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📝</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg: #F7F4EF;
    --surface: #FFFFFF;
    --ink: #1A1A1A;
    --ink-soft: #6B6560;
    --accent: #3DBE72;
    --accent-light: #E6F4EC;
    --done: #B0A89E;
    --border: #E8E2DA;
    --shadow: 0 2px 20px rgba(0,0,0,0.07);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--ink); min-height: 100vh; }

  /* ── LOGIN SCREEN ── */
  #loginScreen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 40px 24px;
  }
  .login-title {
    font-family: 'Playfair Display', serif;
    font-size: 36px;
    font-weight: 700;
    color: var(--ink);
    margin-bottom: 8px;
    text-align: center;
  }
  .login-sub {
    font-size: 14px;
    color: var(--ink-soft);
    margin-bottom: 48px;
    text-align: center;
  }
  .login-card {
    background: var(--surface);
    border-radius: 20px;
    box-shadow: var(--shadow);
    padding: 32px 28px;
    width: 100%;
    max-width: 360px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .google-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    background: var(--surface);
    border: 2px solid var(--border);
    border-radius: 12px;
    padding: 13px 20px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 500;
    color: var(--ink);
    cursor: pointer;
    transition: border-color 0.2s, box-shadow 0.2s;
    width: 100%;
  }
  .google-btn:hover { border-color: #4A90D9; box-shadow: 0 2px 12px rgba(74,144,217,0.15); }
  .google-btn svg { flex-shrink: 0; }
  .divider { display: flex; align-items: center; gap: 10px; color: var(--done); font-size: 12px; }
  .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .email-input {
    width: 100%;
    border: 2px solid var(--border);
    border-radius: 12px;
    padding: 13px 16px;
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
    color: var(--ink);
    outline: none;
    transition: border-color 0.2s;
    background: var(--bg);
  }
  .email-input:focus { border-color: var(--accent); }
  .email-input::placeholder { color: var(--done); }
  .magic-btn {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 12px;
    padding: 13px 20px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    transition: opacity 0.2s;
    width: 100%;
  }
  .magic-btn:active { opacity: 0.85; }
  .magic-btn.secondary {
    background: transparent;
    color: var(--accent);
    border: 2px solid var(--accent);
  }
  .toggle-mode {
    text-align: center;
    font-size: 13px;
    color: var(--ink-soft);
  }
  .toggle-mode a {
    color: var(--accent);
    cursor: pointer;
    text-decoration: none;
    font-weight: 500;
  }
  .login-msg { font-size: 13px; color: var(--ink-soft); text-align: center; min-height: 20px; }
  .login-msg.success { color: var(--accent); }
  .login-msg.error { color: #E07B4F; }

  /* ── APP SCREEN ── */
  #appScreen { display: none; padding: 24px 16px 80px; }

  .header { max-width: 480px; margin: 0 auto 28px; }
  .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
  .title-row { display: flex; align-items: baseline; flex-wrap: wrap; }
  .title { font-family: 'Playfair Display', serif; font-size: 32px; font-weight: 700; color: var(--ink); line-height: 1.1; }
  .date-label { font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 300; color: var(--ink-soft); margin-left: 12px; }

  .user-area { display: flex; align-items: center; gap: 8px; }
  .user-name { font-size: 12px; color: var(--ink-soft); }
  .logout-btn {
    background: none;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 4px 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    color: var(--ink-soft);
    cursor: pointer;
    transition: border-color 0.15s;
  }
  .logout-btn:hover { border-color: var(--accent); color: var(--accent); }

  .progress-row { display: flex; align-items: center; gap: 12px; margin-top: 14px; }
  .progress-bar-wrap { flex: 1; height: 4px; background: var(--border); border-radius: 99px; overflow: hidden; }
  .progress-bar-fill { height: 100%; background: var(--accent); border-radius: 99px; transition: width 0.4s cubic-bezier(.4,0,.2,1); width: 0%; }
  .progress-text { font-size: 12px; color: var(--ink-soft); white-space: nowrap; }

  .section { max-width: 480px; margin: 0 auto 20px; }
  .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; padding: 0 2px; }
  .section-title { font-size: 11px; font-weight: 700; letter-spacing: 0.10em; text-transform: uppercase; color: var(--section-color, var(--ink-soft)); }
  .section-Work     { --section-color: rgba(74,144,217,1); }
  .section-Personal { --section-color: rgba(224,123,79,1); }
  .section-Health   { --section-color: rgba(232,180,50,1); }
  .section-Errand   { --section-color: rgba(160,126,209,1); }
  .section-count { font-size: 10px; color: var(--done); }

  .card { background: var(--surface); border-radius: 14px; overflow: hidden; border: 2px solid var(--card-stroke, rgba(232,226,218,0.6)); }
  .card-Work     { --card-stroke: rgba(74,144,217,0.6); }
  .card-Personal { --card-stroke: rgba(224,123,79,0.6); }
  .card-Health   { --card-stroke: rgba(232,180,50,0.6); }
  .card-Errand   { --card-stroke: rgba(160,126,209,0.6); }

  .task-item { display: flex; align-items: center; gap: 14px; padding: 14px 16px; border-bottom: 1px solid var(--border); transition: background 0.15s; position: relative; animation: slideIn 0.3s ease both; }
  .task-item:last-child { border-bottom: none; }
  .task-item:active { background: var(--bg); }
  @keyframes slideIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  .checkbox { width: 22px; height: 22px; border-radius: 50%; border: 2px solid var(--border); flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all 0.2s cubic-bezier(.4,0,.2,1); background: transparent; cursor: pointer; }
  .task-item.done .checkbox { background: var(--accent); border-color: var(--accent); }
  .checkbox svg { opacity: 0; transform: scale(0.5); transition: all 0.2s cubic-bezier(.4,0,.2,1); }
  .task-item.done .checkbox svg { opacity: 1; transform: scale(1); }

  .task-content { flex: 1; min-width: 0; }
  .task-name { font-size: 15px; font-weight: 400; color: var(--ink); transition: color 0.2s; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .task-item.done .task-name { color: var(--done); text-decoration: line-through; }

  .comment-btn { background: none; border: none; cursor: pointer; padding: 4px; border-radius: 6px; flex-shrink: 0; font-size: 14px; line-height: 1; opacity: 0; position: relative; transition: opacity 0.15s; }
  .task-item:hover .comment-btn { opacity: 1; }
  .comment-btn.has-comment { opacity: 1; }
  @media (hover: none) {
    .comment-btn { opacity: 0; }
    .comment-btn.has-comment { opacity: 1; }
    .delete-btn { opacity: 0; }
  }

  .delete-btn { opacity: 0; background: none; border: none; cursor: pointer; color: var(--done); padding: 4px; border-radius: 6px; flex-shrink: 0; font-size: 16px; line-height: 1; transition: opacity 0.15s, color 0.15s; }
  .task-item:hover .delete-btn { opacity: 1; }
  .delete-btn:hover { color: var(--accent); }

  .comment-panel { display: none; padding: 10px 16px 14px 52px; border-bottom: 1px solid var(--border); background: var(--surface); }
  .comment-panel.open { display: block; }
  .comment-textarea { width: 100%; min-height: 72px; resize: none; overflow: hidden; border: 1.5px solid var(--border); border-radius: 8px; padding: 9px 12px; font-family: 'DM Sans', sans-serif; font-size: 16px; color: var(--ink); background: var(--bg); outline: none; transition: border-color 0.2s; line-height: 1.5; display: block; box-sizing: border-box; }
  .comment-textarea:focus { border-color: var(--accent); }
  .comment-textarea::placeholder { color: var(--done); }
  .comment-save-row { display: flex; justify-content: flex-end; margin-top: 6px; }
  .comment-save-btn { background: var(--accent); color: #fff; border: none; border-radius: 7px; padding: 6px 14px; font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 500; cursor: pointer; }

  .add-row { max-width: 480px; margin: 0 auto 12px; }
  .add-form { display: flex; gap: 8px; align-items: center; width: 100%; }
  .add-input { flex: 1; min-width: 0; background: var(--surface); border: none; border-radius: 10px; padding: 11px 14px; font-family: 'DM Sans', sans-serif; font-size: 16px; color: var(--ink); outline: none; transition: box-shadow 0.2s; box-shadow: var(--shadow); }
  .add-input:focus { box-shadow: 0 2px 20px rgba(0,0,0,0.13), 0 0 0 2px rgba(61,190,114,0.6); }
  .add-input::placeholder { color: var(--done); }
  .tag-select { flex-shrink: 0; background: var(--surface); border: none; border-radius: 10px; padding: 11px 8px; font-family: 'DM Sans', sans-serif; font-size: 13px; color: var(--ink-soft); outline: none; cursor: pointer; box-shadow: var(--shadow); }
  .add-btn { width: 42px; height: 42px; border-radius: 10px; background: var(--accent); color: #fff; border: none; font-size: 22px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; box-shadow: 0 2px 8px rgba(61,190,114,0.3); }
  .add-btn:active { transform: scale(0.93); }

  .empty { text-align: center; padding: 28px 16px; color: var(--done); font-size: 14px; }
  @keyframes pop { 0% { transform: scale(1); } 50% { transform: scale(1.18); } 100% { transform: scale(1); } }
  .task-item.popping .checkbox { animation: pop 0.25s ease; }

  .all-done { max-width: 480px; margin: 0 auto 20px; background: #E6F4EC; border-radius: 14px; padding: 16px 20px; align-items: center; gap: 12px; display: none; }
  .all-done.show { display: flex; }
  .all-done-icon { font-size: 28px; }
  .all-done-text { font-size: 14px; color: var(--accent); font-weight: 500; }
  .all-done-text small { display: block; font-weight: 400; font-size: 12px; color: var(--ink-soft); }

  /* Sync indicator */
  .sync-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--done); display: inline-block; margin-left: 8px; vertical-align: middle; transition: background 0.3s; }
  .sync-dot.syncing { background: #E8B432; }
  .sync-dot.synced { background: var(--accent); }
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="loginScreen">
  <div class="login-title">Today's List</div>
  <div class="login-sub">Sign in to access your personal checklist</div>
  <div class="login-card">
    <button class="google-btn" onclick="signInGoogle()">
      <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"/><path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z"/><path fill="#FBBC05" d="M3.964 10.71c-.18-.54-.282-1.117-.282-1.71s.102-1.17.282-1.71V4.958H.957C.347 6.173 0 7.548 0 9s.348 2.827.957 4.042l3.007-2.332z"/><path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z"/></svg>
      Continue with Google
    </button>
    <div class="divider">or</div>
    <input class="email-input" id="emailInput" type="email" placeholder="Email address" />
    <input class="email-input" id="passwordInput" type="password" placeholder="Password" />
    <button class="magic-btn" id="submitBtn" onclick="handleEmailAuth()">Sign In</button>
    <div class="toggle-mode" id="toggleMode">
      No account? <a onclick="toggleAuthMode()">Create one</a>
    </div>
    <div class="login-msg" id="loginMsg"></div>
  </div>
</div>

<!-- APP SCREEN -->
<div id="appScreen">
  <div class="header">
    <div class="header-top">
      <div class="title-row">
        <div class="title">Today's List</div>
        <div class="date-label" id="dateLabel"></div>
      </div>
      <div class="user-area">
        <span class="sync-dot" id="syncDot" title="Sync status"></span>
        <button class="logout-btn" onclick="signOut()">Sign out</button>
      </div>
    </div>
    <div class="progress-row">
      <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progressFill"></div></div>
      <div class="progress-text" id="progressText">0 / 0 done</div>
    </div>
  </div>

  <div class="add-row">
    <div class="add-form">
      <input class="add-input" id="addInput" type="text" placeholder="Add a task…" maxlength="80" />
      <select class="tag-select" id="tagSelect">
        <option value="Work">💼 Work</option>
        <option value="Personal">🏠 Personal</option>
        <option value="Health">💪 Health</option>
        <option value="Errand">🛒 Errand</option>
      </select>
      <button class="add-btn" onclick="addTask()">+</button>
    </div>
  </div>

  <div class="all-done" id="allDoneBanner">
    <div class="all-done-icon">🎉</div>
    <div class="all-done-text">All done!
      <small>Great work today. Enjoy the rest of your day.</small>
    </div>
  </div>

  <div id="sectionsContainer"></div>
</div>

<script>
// ── SUPABASE INIT ──
var SUPABASE_URL = 'https://vohfvlkpzlynyyvrpkcc.supabase.co';
var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZvaGZ2bGtwemx5bnl5dnJwa2NjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwNjc2MjksImV4cCI6MjA5MDY0MzYyOX0.fGOwcjJclF3MmlNUX5PjhMBE_T0R47_vKE5iM0BBO0Y';
var sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

var TAGS = ['Work','Personal','Health','Errand'];
var TAG_ICONS = { Work:'💼', Personal:'🏠', Health:'💪', Errand:'🛒' };
var currentUser = null;
var tasks = [];
var appInitialized = false;

// ── AUTH ──
async function signInGoogle() {
  var { error } = await sb.auth.signInWithOAuth({
    provider: 'google',
    options: { redirectTo: 'https://motionthis.github.io/y-checklist' }
  });
  if (error) showMsg('Error: ' + error.message, 'error');
}

var authMode = 'signin'; // 'signin' or 'signup'

function toggleAuthMode() {
  authMode = authMode === 'signin' ? 'signup' : 'signin';
  document.getElementById('submitBtn').textContent = authMode === 'signin' ? 'Sign In' : 'Create Account';
  document.getElementById('toggleMode').innerHTML = authMode === 'signin'
    ? 'No account? <a onclick="toggleAuthMode()">Create one</a>'
    : 'Already have an account? <a onclick="toggleAuthMode()">Sign in</a>';
  showMsg('', '');
}

async function handleEmailAuth() {
  var email = document.getElementById('emailInput').value.trim();
  var password = document.getElementById('passwordInput').value;
  if (!email || !password) { showMsg('Please enter email and password', 'error'); return; }
  if (password.length < 6) { showMsg('Password must be at least 6 characters', 'error'); return; }
  showMsg('Please wait…', '');
  if (authMode === 'signup') {
    var { error } = await sb.auth.signUp({ email: email, password: password });
    if (error) showMsg('Error: ' + error.message, 'error');
    else showMsg('✅ Account created! Check email to confirm, or sign in now.', 'success');
  } else {
    var { error } = await sb.auth.signInWithPassword({ email: email, password: password });
    if (error) showMsg('Error: ' + error.message, 'error');
  }
}

async function signOut() {
  await sb.auth.signOut();
  currentUser = null;
  tasks = [];
  appInitialized = false;
  document.getElementById('appScreen').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'flex';
}

function showMsg(msg, type) {
  var el = document.getElementById('loginMsg');
  el.textContent = msg;
  el.className = 'login-msg' + (type ? ' ' + type : '');
}

// ── SYNC ──
function setSyncStatus(status) {
  var dot = document.getElementById('syncDot');
  if (!dot) return;
  dot.className = 'sync-dot ' + status;
}

async function loadTasks() {
  setSyncStatus('syncing');
  var { data, error } = await sb.from('tasks').select('*').eq('user_id', currentUser.id).order('position', { ascending: true });
  if (error) { setSyncStatus(''); return; }
  tasks = (data || []).map(function(t) {
    return { id: t.id, name: t.name, tag: t.tag, done: t.done, comment: t.comment || '', position: t.position || 0 };
  });
  setSyncStatus('synced');
  render();
}

async function syncAdd(task) {
  setSyncStatus('syncing');
  var { data, error } = await sb.from('tasks').insert({
    user_id: currentUser.id,
    name: task.name,
    tag: task.tag,
    done: task.done,
    comment: task.comment,
    position: task.position
  }).select().single();
  if (!error && data) task.id = data.id;
  setSyncStatus('synced');
}

async function syncUpdate(task) {
  setSyncStatus('syncing');
  await sb.from('tasks').update({ done: task.done, comment: task.comment }).eq('id', task.id);
  setSyncStatus('synced');
}

async function syncDelete(id) {
  setSyncStatus('syncing');
  await sb.from('tasks').delete().eq('id', id);
  setSyncStatus('synced');
}

// ── REALTIME ──
function subscribeRealtime() {
  sb.channel('tasks-changes')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'tasks', filter: 'user_id=eq.' + currentUser.id }, function() {
      loadTasks();
    })
    .subscribe();
}

// ── APP INIT ──
async function initApp(user) {
  if (appInitialized) return;
  appInitialized = true;
  currentUser = user;
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('appScreen').style.display = 'block';
  setDate();
  await loadTasks();
  subscribeRealtime();
}

// ── CHECK SESSION ON LOAD ──
window.addEventListener('load', async function() {

  // GitHub Pages serves at /y-checklist — after Google OAuth, Supabase
  // appends #access_token=... to the URL. We need to explicitly exchange it.
  var hash = window.location.hash;
  if (hash && hash.includes('access_token')) {
    // Let Supabase parse the hash and create a session
    var params = {};
    hash.replace('#', '').split('&').forEach(function(part) {
      var item = part.split('=');
      params[item[0]] = decodeURIComponent(item[1]);
    });
    if (params.access_token && params.refresh_token) {
      var { data, error } = await sb.auth.setSession({
        access_token: params.access_token,
        refresh_token: params.refresh_token
      });
      if (!error && data && data.user) {
        window.history.replaceState({}, document.title, window.location.pathname);
        initApp(data.user);
        return;
      }
    }
  }

  // Normal session check
  var { data: { session } } = await sb.auth.getSession();
  if (session && session.user) {
    initApp(session.user);
    return;
  }

  // Listen for auth state changes
  sb.auth.onAuthStateChange(function(event, session) {
    if ((event === 'SIGNED_IN' || event === 'TOKEN_REFRESHED') && session && session.user) {
      initApp(session.user);
    }
    if (event === 'SIGNED_OUT') {
      appInitialized = false;
      document.getElementById('appScreen').style.display = 'none';
      document.getElementById('loginScreen').style.display = 'flex';
    }
  });
});

// ── UI HELPERS ──
function escHtml(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function setDate() {
  var d = new Date();
  var days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  var months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  var el = document.getElementById('dateLabel');
  if (el) el.textContent = days[d.getDay()] + ', ' + months[d.getMonth()] + ' ' + d.getDate();
}

function updateProgress() {
  var total = tasks.length;
  var done = tasks.filter(function(t){ return t.done; }).length;
  var pct = total ? Math.round((done/total)*100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = done + ' / ' + total + ' done';
  var banner = document.getElementById('allDoneBanner');
  if (total > 0 && done === total) banner.classList.add('show');
  else banner.classList.remove('show');
}

function render() {
  var container = document.getElementById('sectionsContainer');
  container.innerHTML = '';
  var grouped = {};
  TAGS.forEach(function(t){ grouped[t] = []; });
  tasks.forEach(function(t){ if (grouped[t.tag]) grouped[t.tag].push(t); });

  TAGS.forEach(function(tag) {
    var items = grouped[tag];
    if (!items.length) return;
    var doneCount = items.filter(function(i){ return i.done; }).length;
    var section = document.createElement('div');
    section.className = 'section';
    section.innerHTML =
      '<div class="section-header">' +
        '<span class="section-title section-' + tag + '">' + TAG_ICONS[tag] + ' ' + tag + '</span>' +
        '<span class="section-count" id="count-' + tag + '">' + doneCount + '/' + items.length + '</span>' +
      '</div>' +
      '<div class="card card-' + tag + '" id="card-' + tag + '"></div>';
    container.appendChild(section);

    var card = document.getElementById('card-' + tag);
    items.forEach(function(task, i) {
      var hasComment = task.comment && task.comment.trim().length > 0;
      var el = document.createElement('div');
      el.className = 'task-item' + (task.done ? ' done' : '');
      el.style.animationDelay = (i * 0.04) + 's';
      el.dataset.id = String(task.id);
      el.innerHTML =
        '<div class="checkbox"><svg width="11" height="9" viewBox="0 0 11 9" fill="none"><path d="M1 4L4 7.5L10 1" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>' +
        '<div class="task-content"><div class="task-name">' + escHtml(task.name) + '</div></div>' +
        '<button class="comment-btn' + (hasComment ? ' has-comment' : '') + '" title="Note" onclick="toggleComment(event,\'' + task.id + '\')">' + (hasComment ? '✏️' : '💬') + '</button>' +
        '<button class="delete-btn" onclick="deleteTask(event,\'' + task.id + '\')" title="Remove">×</button>';

      var commentEl = document.createElement('div');
      commentEl.className = 'comment-panel';
      commentEl.id = 'comment-panel-' + task.id;
      commentEl.innerHTML =
        '<textarea class="comment-textarea" id="comment-text-' + task.id + '" placeholder="Add a note, issue, or update…">' + escHtml(task.comment || '') + '</textarea>' +
        '<div class="comment-save-row"><button class="comment-save-btn" onclick="saveComment(\'' + task.id + '\')">Save note</button></div>';

      el.addEventListener('click', function(e) {
        if (!e.target.closest('.checkbox')) return;
        toggleTask(task.id, el);
      });
      el.addEventListener('touchend', function(e) {
        if (e.target.closest('.checkbox')) { e.preventDefault(); toggleTask(task.id, el); }
      }, { passive: false });

      card.appendChild(el);
      card.appendChild(commentEl);
    });
  });
  updateProgress();
}

// ── TASK ACTIONS ──
async function addTask() {
  var input = document.getElementById('addInput');
  var tag = document.getElementById('tagSelect').value;
  var name = input.value.trim();
  if (!name) { input.focus(); return; }
  var task = { id: 'tmp-' + Date.now(), name: name, tag: tag, done: false, comment: '', position: tasks.length };
  tasks.push(task);
  input.value = '';
  input.focus();
  render();
  await syncAdd(task);
}

async function toggleTask(id, el) {
  var task = tasks.find(function(t){ return t.id == id; });
  if (!task) return;
  task.done = !task.done;
  el.classList.toggle('done', task.done);
  el.classList.add('popping');
  setTimeout(function(){ el.classList.remove('popping'); }, 300);
  updateProgress();
  var countEl = document.getElementById('count-' + task.tag);
  if (countEl) {
    var tagItems = tasks.filter(function(t){ return t.tag === task.tag; });
    countEl.textContent = tagItems.filter(function(t){ return t.done; }).length + '/' + tagItems.length;
  }
  await syncUpdate(task);
}

async function deleteTask(e, id) {
  e.stopPropagation();
  tasks = tasks.filter(function(t){ return t.id != id; });
  render();
  await syncDelete(id);
}

function autoExpand(ta) {
  ta.style.height = 'auto';
  ta.style.height = ta.scrollHeight + 'px';
}

function toggleComment(e, id) {
  e.stopPropagation();
  var panel = document.getElementById('comment-panel-' + id);
  if (!panel) return;
  var isOpen = panel.classList.toggle('open');
  if (isOpen) {
    setTimeout(function() {
      var ta = document.getElementById('comment-text-' + id);
      if (ta) { ta.focus(); autoExpand(ta); ta.addEventListener('input', function(){ autoExpand(ta); }); }
    }, 50);
  }
}

async function saveComment(id) {
  var ta = document.getElementById('comment-text-' + id);
  if (!ta) return;
  var task = tasks.find(function(t){ return t.id == id; });
  if (!task) return;
  task.comment = ta.value;
  var btn = document.querySelector('.task-item[data-id="' + id + '"] .comment-btn');
  if (btn) {
    var hasNote = task.comment.trim().length > 0;
    btn.classList.toggle('has-comment', hasNote);
    btn.textContent = hasNote ? '✏️' : '💬';
  }
  var panel = document.getElementById('comment-panel-' + id);
  if (panel) panel.classList.remove('open');
  await syncUpdate(task);
}

document.getElementById('addInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') addTask();
});
document.getElementById('emailInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') document.getElementById('passwordInput').focus();
});
document.getElementById('passwordInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') handleEmailAuth();
});
</script>
